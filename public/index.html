<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Evolution Bullet">
  <meta name="theme-color" content="#7ad7ff">
  <meta property="og:title" content="Evolution Bullet">
  <meta property="og:description" content="한 발의 진화 탄환으로 귀여운 몬스터를 쓸어버리는 1분 캐주얼 액션 게임">
  <meta property="og:image" content="assets/og/evolution-bullet-og.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="assets/og/evolution-bullet-og.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <title>Evolution Bullet</title>
  <style>
    :root {
      color-scheme: light;
      --sky: #9de7ff;
      --mint: #9af5cf;
      --coral: #ff759a;
      --ink: #30415f;
      --panel: rgba(255, 255, 255, 0.72);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    [hidden] { display: none !important; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #e8f9ff;
      color: var(--ink);
      font-family: ui-rounded, "SF Pro Rounded", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #app {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #95e2ff;
    }
    canvas {
      width: 100vw;
      height: 100dvh;
      display: block;
      border-radius: 0;
      touch-action: none;
    }
    .hud {
      position: absolute;
      inset: env(safe-area-inset-top) env(safe-area-inset-right) auto env(safe-area-inset-left);
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px max(14px, env(safe-area-inset-left)) 8px;
      pointer-events: none;
      gap: 8px;
    }
    .pill {
      position: relative;
      min-width: 96px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 16px 6px;
      border: 3px solid rgba(255,255,255,.96);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(220,246,255,.9));
      box-shadow: 0 7px 0 rgba(58,128,166,.28), 0 12px 26px rgba(36,74,111,.16), inset 0 -5px 0 rgba(104,190,226,.12);
      font-weight: 1000;
      font-size: 19px;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      color: #263956;
      text-shadow: 0 2px 0 #fff;
    }
    .pill strong {
      display: block;
      font-size: 9px;
      line-height: 1;
      letter-spacing: .7px;
      color: #6380a7;
      text-shadow: none;
    }
    .pill b {
      display: block;
      min-width: 42px;
      font-size: 22px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transform-origin: center;
    }
    .scorePulse b { animation: scorePunch .28s ease both; }
    .scoreFly {
      position: absolute;
      left: 34px;
      top: 58px;
      z-index: 4;
      pointer-events: none;
      color: #fff36d;
      font-size: 28px;
      font-weight: 1000;
      text-shadow: 0 4px 0 rgba(73,56,95,.42), 0 0 18px rgba(255,117,154,.85);
      animation: scoreFly .72s cubic-bezier(.2, 1.25, .3, 1) both;
    }
    @keyframes scorePunch {
      0% { transform: scale(1); color: #263956; }
      38% { transform: scale(1.32) rotate(-3deg); color: #ff4f94; }
      100% { transform: scale(1); color: #263956; }
    }
    @keyframes scoreFly {
      0% { opacity: 0; transform: translateY(12px) scale(.72) rotate(-4deg); }
      22% { opacity: 1; transform: translateY(-4px) scale(1.2) rotate(2deg); }
      100% { opacity: 0; transform: translateY(-58px) scale(.94) rotate(-2deg); }
    }
    .bar {
      width: min(31vw, 310px);
      height: 20px;
      border-radius: 12px;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,.92);
      background: rgba(255,255,255,.62);
      box-shadow: 0 5px 0 rgba(58,128,166,.22), inset 0 2px 5px rgba(37,69,105,.12);
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffe96e, #ff7aa5, #8b63ff);
      transition: width .18s ease;
      box-shadow: 0 0 16px rgba(255,122,165,.72);
    }
    .centerText {
      position: absolute;
      left: 50%;
      top: 19%;
      transform: translate(-50%, -50%);
      min-width: 240px;
      text-align: center;
      font-size: clamp(22px, 5vw, 54px);
      font-weight: 1000;
      color: #fff;
      text-shadow: 0 4px 0 rgba(48,65,95,.28), 0 0 22px rgba(255,122,165,.72);
      pointer-events: none;
      opacity: 0;
    }
    .centerText.show { animation: popText .88s ease both; }
    @keyframes popText {
      0% { opacity: 0; transform: translate(-50%, -44%) scale(.76); }
      22% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
      78% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -58%) scale(.9); }
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(28, 64, 104, .12);
      z-index: 5;
    }
    #start {
      place-items: stretch;
      padding: 18px;
      background:
        linear-gradient(90deg, rgba(31,57,103,.66), rgba(31,57,103,.04) 42%, rgba(31,57,103,.48)),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(56,120,170,.18)),
        url("assets/og/evolution-bullet-og.png") center / cover no-repeat;
    }
    .startStage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(320px, 42vw) 1fr;
      align-items: center;
      padding: clamp(18px, 4vw, 54px);
    }
    .brandLockup {
      align-self: center;
      max-width: 560px;
      color: #fff;
      text-shadow: 0 4px 0 rgba(52,62,120,.35), 0 12px 28px rgba(24,42,87,.28);
    }
    .brandLockup .eyebrow {
      display: inline-flex;
      align-items: center;
      height: 28px;
      padding: 0 12px;
      border: 2px solid rgba(255,255,255,.86);
      border-radius: 999px;
      background: rgba(255,112,151,.9);
      box-shadow: 0 4px 0 rgba(164,58,102,.5);
      font-size: 13px;
      font-weight: 1000;
      color: #fff;
      text-shadow: none;
    }
    .brandLockup h1 {
      margin: 12px 0 10px;
      font-size: clamp(42px, 8.5vw, 98px);
      line-height: .86;
      letter-spacing: 0;
      color: #fff;
    }
    .brandLockup h1 span {
      display: block;
      color: #fff06b;
    }
    .brandLockup p {
      width: min(500px, 42vw);
      margin: 0 0 18px;
      color: #eefbff;
      font-size: clamp(16px, 2vw, 24px);
      line-height: 1.32;
      font-weight: 1000;
    }
    .startBadges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 20px;
    }
    .startBadges span {
      display: inline-flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      border: 2px solid rgba(255,255,255,.8);
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      color: #284361;
      font-size: 13px;
      font-weight: 1000;
      text-shadow: none;
      box-shadow: 0 4px 0 rgba(68,117,146,.24);
    }
    .startPreview {
      position: absolute;
      right: clamp(24px, 6vw, 92px);
      bottom: clamp(22px, 6vw, 62px);
      display: grid;
      gap: 10px;
      justify-items: center;
      color: #fff;
      font-weight: 1000;
      text-shadow: 0 3px 0 rgba(35,64,108,.32);
      animation: floatPreview 2.4s ease-in-out infinite;
    }
    .startPreview .bulletBadge {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,.9);
      background: radial-gradient(circle at 30% 25%, #fff, #fff36d 30%, #ff76a6 63%, #7d61ff 100%);
      box-shadow: 0 0 34px rgba(255,243,109,.85), 0 10px 0 rgba(55,71,137,.2);
    }
    @keyframes floatPreview {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .modal {
      width: min(560px, 92vw);
      padding: 24px;
      border: 3px solid rgba(255,255,255,.92);
      border-radius: 8px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 20px 60px rgba(48,65,95,.18);
      text-align: center;
    }
    .modal h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1;
      color: #ff5f97;
    }
    .modal p {
      margin: 8px 0 18px;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 800;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      height: 54px;
      border: 0;
      border-radius: 8px;
      padding: 0 28px;
      background: linear-gradient(180deg, #ff82ae, #ff4f89);
      color: #fff;
      font-weight: 1000;
      font-size: 20px;
      box-shadow: 0 8px 0 #c63e71, 0 14px 28px rgba(66,48,93,.2);
      cursor: pointer;
      text-shadow: 0 2px 0 rgba(112,38,80,.24);
    }
    button.secondary {
      background: #6cccf5;
      box-shadow: 0 8px 0 #42a7d1;
    }
    button:active { transform: translateY(5px); box-shadow: 0 3px 0 rgba(48,65,95,.22); }
    #rotate {
      display: none;
      z-index: 10;
      background: linear-gradient(180deg, #a9ebff, #f7fbff);
    }
    @media (orientation: portrait) {
      #rotate { display: grid; }
    }
    @media (max-width: 760px) {
      .hud { height: 50px; padding-top: 6px; }
      .pill { min-width: 72px; height: 40px; padding: 3px 10px 5px; border-radius: 13px; font-size: 15px; }
      .pill strong { font-size: 8px; }
      .pill b { font-size: 17px; min-width: 28px; }
      .bar { width: 22vw; height: 16px; }
      .startStage { grid-template-columns: 1fr; padding: 18px 20px; align-items: end; }
      .brandLockup p { width: min(440px, 64vw); font-size: 15px; }
      .startPreview { right: 28px; bottom: 22px; transform: scale(.76); }
      .startPreview .bulletBadge { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>
  <main id="app">
    <canvas id="game" width="1280" height="720" aria-label="Evolution Bullet game canvas"></canvas>
    <section class="hud">
      <div class="pill" id="scoreBox"><strong>SCORE</strong><b id="score">0</b></div>
      <div class="pill"><strong>TIME</strong><b id="time">60.0</b></div>
      <div class="pill"><strong>BULLET</strong><b>LV <span id="level">1</span></b></div>
      <div class="bar" aria-hidden="true"><i id="xp"></i></div>
      <div class="pill" id="combo">COMBO 0</div>
    </section>
    <div class="centerText" id="banner"></div>
    <section class="overlay" id="start">
      <div class="startStage">
        <div class="brandLockup">
          <span class="eyebrow">60 SEC ONE-SHOT ACTION</span>
          <h1>Evolution <span>Bullet</span></h1>
          <p>한 발을 당겨 쏘고, 튕기고, 진화시켜 화면을 쓸어버리세요.</p>
          <div class="startBadges">
            <span>Pull & Release</span>
            <span>7 Evolutions</span>
            <span>Boss Rush</span>
          </div>
          <div class="actions">
            <button id="startBtn">PLAY NOW</button>
          </div>
        </div>
        <div class="startPreview" aria-hidden="true">
          <div class="bulletBadge"></div>
          <span>DRAG BACK · RELEASE</span>
        </div>
      </div>
    </section>
    <section class="overlay" id="result" hidden>
      <div class="modal">
        <h1>RESULT</h1>
        <p id="resultText"></p>
        <div class="actions">
          <button id="againBtn">다시하기</button>
          <button class="secondary" id="shareBtn">공유하기</button>
        </div>
      </div>
    </section>
    <section class="overlay" id="rotate">
      <div class="modal">
        <h1>Landscape</h1>
        <p>가로 화면으로 플레이해주세요</p>
      </div>
    </section>
  </main>
  <script>
    (() => {
      const W = 1280, H = 720, TAU = Math.PI * 2;
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const rand = (a, b) => a + Math.random() * (b - a);
      const dist2 = (a, b) => (a.x - b.x) ** 2 + (a.y - b.y) ** 2;
      const elements = {
        canvas: document.getElementById("game"),
        score: document.getElementById("score"),
        time: document.getElementById("time"),
        level: document.getElementById("level"),
        xp: document.getElementById("xp"),
        combo: document.getElementById("combo"),
        banner: document.getElementById("banner"),
        start: document.getElementById("start"),
        result: document.getElementById("result"),
        resultText: document.getElementById("resultText"),
        scoreBox: document.getElementById("scoreBox")
      };

      class AudioSystem {
        constructor() { this.ctx = null; this.master = null; }
        unlock() {
          if (this.ctx) return;
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.master = this.ctx.createGain();
          this.master.gain.value = .17;
          this.master.connect(this.ctx.destination);
        }
        tone(freq, dur, type = "sine", slide = 1, gain = .55) {
          if (!this.ctx) return;
          const t = this.ctx.currentTime, osc = this.ctx.createOscillator(), g = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, t);
          osc.frequency.exponentialRampToValueAtTime(Math.max(50, freq * slide), t + dur);
          g.gain.setValueAtTime(gain, t);
          g.gain.exponentialRampToValueAtTime(.001, t + dur);
          osc.connect(g).connect(this.master);
          osc.start(t);
          osc.stop(t + dur);
        }
        launch() { this.tone(230, .18, "triangle", 2.2); }
        bounce() { this.tone(540, .08, "square", .55, .25); }
        hit() { this.tone(180, .07, "sawtooth", .8, .18); }
        kill() { this.tone(720, .14, "triangle", 1.65, .34); }
        boom() { this.tone(95, .28, "sawtooth", .38, .52); this.tone(460, .18, "triangle", 1.8, .25); }
        evolve() { [420, 590, 820, 1180].forEach((f, i) => setTimeout(() => this.tone(f, .22, "triangle", 1.35, .38), i * 55)); }
        warn() { this.tone(150, .45, "sawtooth", .72, .5); }
        result() { [500, 660, 880].forEach((f, i) => setTimeout(() => this.tone(f, .2, "sine", 1.1, .33), i * 90)); }
      }
      class HapticSystem {
        pulse(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
      }
      class UIManager {
        constructor(game) { this.game = game; this.displayScore = 0; this.lastScore = 0; }
        banner(text) {
          elements.banner.textContent = text;
          elements.banner.classList.remove("show");
          void elements.banner.offsetWidth;
          elements.banner.classList.add("show");
        }
        scoreFly(amount) {
          const node = document.createElement("div");
          node.className = "scoreFly";
          node.textContent = `+${amount.toLocaleString()}`;
          document.getElementById("app").appendChild(node);
          node.addEventListener("animationend", () => node.remove(), { once: true });
        }
        update(dt) {
          this.displayScore += (this.game.score.score - this.displayScore) * clamp(dt * 10, 0, 1);
          elements.score.textContent = Math.round(this.displayScore).toLocaleString();
          if (this.game.score.score > this.lastScore) {
            elements.scoreBox.classList.remove("scorePulse");
            void elements.scoreBox.offsetWidth;
            elements.scoreBox.classList.add("scorePulse");
            this.lastScore = this.game.score.score;
          }
          elements.time.textContent = Math.max(0, this.game.timeLeft).toFixed(1);
          elements.level.textContent = this.game.bullet.level;
          elements.xp.style.width = `${this.game.bullet.level >= 7 ? 100 : this.game.score.xpProgress() * 100}%`;
          elements.combo.textContent = `COMBO ${this.game.score.combo}`;
        }
        showResult() {
          const s = this.game.score;
          elements.resultText.innerHTML =
            `최종 점수 ${s.score.toLocaleString()}<br>` +
            `최고 콤보 ${s.bestCombo} · 처치 ${s.kills}<br>` +
            `탄환 Lv ${this.game.bullet.level} · ${this.game.bullet.element.name}`;
          elements.result.hidden = false;
        }
      }
      class ScoreSystem {
        constructor(game) { this.game = game; this.score = 0; this.combo = 0; this.bestCombo = 0; this.kills = 0; this.comboTimer = 0; this.xp = 0; }
        reset() { Object.assign(this, { score: 0, combo: 0, bestCombo: 0, kills: 0, comboTimer: 0, xp: 0 }); }
        addKill(enemy, boss = false) {
          this.kills++;
          this.combo++;
          this.bestCombo = Math.max(this.bestCombo, this.combo);
          this.comboTimer = 2.3;
          const gained = (boss ? 5000 : enemy.value) * (1 + Math.min(2.5, this.combo * .04));
          this.score += Math.round(gained);
          this.xp += boss ? 120 : enemy.xp;
          this.game.ui.scoreFly(Math.round(gained));
          this.game.effects.text(enemy.x, enemy.y - enemy.r, `+${Math.round(gained)}`, "#fff36d", 32 + Math.min(38, this.combo * 1.5));
          if (this.combo === 8) this.game.ui.banner("NICE!");
          if (this.combo === 18) this.game.ui.banner("GREAT!");
          if (this.combo === 34) this.game.ui.banner("INSANE!");
          this.tryLevel();
        }
        tryLevel() {
          const need = [0, 45, 105, 185, 290, 420, 580];
          while (this.game.bullet.level < 7 && this.xp >= need[this.game.bullet.level]) {
            this.game.bullet.level++;
            this.game.evolve();
          }
        }
        xpProgress() {
          const need = [0, 45, 105, 185, 290, 420, 580, 780];
          const l = this.game.bullet.level;
          return clamp((this.xp - need[l - 1]) / (need[l] - need[l - 1]), 0, 1);
        }
        update(dt) {
          this.comboTimer -= dt;
          if (this.comboTimer <= 0) this.combo = 0;
        }
      }
      class ParticleSystem {
        constructor() { this.items = []; this.pool = []; this.texts = []; this.waves = []; }
        take() { return this.pool.pop() || {}; }
        burst(x, y, count, colors, speed = 220, size = 5) {
          for (let i = 0; i < count; i++) {
            const p = this.take(), a = rand(0, TAU), v = rand(speed * .25, speed);
            Object.assign(p, { x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: rand(.35, .9), max: .9, size: rand(size * .45, size), color: colors[i % colors.length] });
            this.items.push(p);
          }
        }
        shockwave(x, y, color, r = 110) { this.waves.push({ x, y, life: .38, max: .38, r, color }); }
        text(x, y, text, color = "#fff", size = 22) { this.texts.push({ x, y, vy: -126, life: 1.05, text, color, size }); }
        update(dt) {
          for (let i = this.items.length - 1; i >= 0; i--) {
            const p = this.items[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 360 * dt;
            if (p.life <= 0) this.pool.push(this.items.splice(i, 1)[0]);
          }
          for (let i = this.texts.length - 1; i >= 0; i--) {
            const t = this.texts[i]; t.life -= dt; t.y += t.vy * dt;
            if (t.life <= 0) this.texts.splice(i, 1);
          }
          for (let i = this.waves.length - 1; i >= 0; i--) {
            this.waves[i].life -= dt;
            if (this.waves[i].life <= 0) this.waves.splice(i, 1);
          }
        }
        draw(ctx) {
          for (const w of this.waves) {
            const k = 1 - w.life / w.max;
            ctx.globalAlpha = 1 - k;
            ctx.strokeStyle = w.color; ctx.lineWidth = 8 * (1 - k) + 2;
            ctx.beginPath(); ctx.arc(w.x, w.y, w.r * k, 0, TAU); ctx.stroke();
          }
          ctx.globalAlpha = 1;
          for (const p of this.items) {
            ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          for (const t of this.texts) {
            ctx.globalAlpha = clamp(t.life / 1.05, 0, 1);
            ctx.font = `1000 ${t.size}px ui-rounded, sans-serif`;
            ctx.lineWidth = Math.max(6, t.size * .18); ctx.strokeStyle = "rgba(48,65,95,.46)"; ctx.strokeText(t.text, t.x, t.y);
            ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y);
          }
          ctx.globalAlpha = 1;
        }
      }
      class Player {
        constructor() { this.x = W * .5; this.y = H - 92; this.strain = 0; this.jump = 0; }
        update(dt, aiming, power, ended) {

          this.ui = new UIManager(this); this.input = new InputSystem(this);
          this.state = "ready"; this.timeLeft = 60; this.last = 0; this.shakeTime = 0; this.shakePower = 0; this.hitStop = 0; this.flash = 0; this.lightning = [];
          this.loop = this.loop.bind(this); requestAnimationFrame(this.loop);
        }
        start() {
          this.audio.unlock(); elements.start.hidden = true; elements.result.hidden = true;
          this.state = "playing"; this.timeLeft = 60; this.last = performance.now();
          this.bullet.reset(); this.enemies.reset(); this.score.reset(); this.effects = new ParticleSystem(); this.collision = new CollisionSystem(this);
          this.ui.banner("PULL & RELEASE!");
        }
        end() { this.state = "ended"; this.audio.result(); this.ui.showResult(); }
        evolve() {
          this.ui.banner("EVOLUTION!");
          this.flash = .22; this.hitStop = .18;
          this.effects.burst(this.bullet.x, this.bullet.y, 90, ["#ffffff", "#fff36d", "#ff8fac", "#8b63ff"], 520, 8);
          this.effects.shockwave(this.bullet.x, this.bullet.y, "#ffffff", 190);
          this.audio.evolve(); this.haptic.pulse(80); this.shake(25, .35);
        }
        shake(power, time) { this.shakePower = Math.max(this.shakePower, power); this.shakeTime = Math.max(this.shakeTime, time); }
        update(dt) {
          if (this.state !== "playing") return;
          if (this.hitStop > 0) { this.hitStop -= dt; dt *= .18; }
          this.timeLeft -= dt;
          if (this.timeLeft <= 0) { this.timeLeft = 0; this.end(); return; }
          this.score.update(dt); this.player.update(dt, this.input.active, this.input.power, this.state === "ended");
          this.bullet.update(dt, this); this.enemies.update(dt); this.collision.update(); this.effects.update(dt);
          for (let i = this.lightning.length - 1; i >= 0; i--) { this.lightning[i].life -= dt; if (this.lightning[i].life <= 0) this.lightning.splice(i, 1); }
          this.shakeTime -= dt; this.flash -= dt;
        }
        drawBackground(ctx) {
          const grd = ctx.createLinearGradient(0, 0, 0, H);
          grd.addColorStop(0, "#78dfff"); grd.addColorStop(.45, "#d7f8ff"); grd.addColorStop(.78, "#c8f8d9"); grd.addColorStop(1, "#80dc9d");
          ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = "rgba(255,255,255,.55)";
          for (let i = 0; i < 6; i++) {
            const x = (i * 250 + performance.now() * .006) % (W + 180) - 90;
            const y = 84 + (i % 3) * 42;
            ctx.beginPath(); ctx.ellipse(x, y, 56, 18, 0, 0, TAU); ctx.ellipse(x + 43, y + 4, 42, 15, 0, 0, TAU); ctx.fill();
          }
          ctx.fillStyle = "#81dba6";
          ctx.beginPath(); ctx.moveTo(0, H - 185);
          for (let x = 0; x <= W; x += 80) ctx.lineTo(x, H - 178 + Math.sin(x * .018) * 10);
          ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "#5fcf8e";
          ctx.beginPath(); ctx.moveTo(0, H - 112);
          for (let x = 0; x <= W; x += 64) ctx.lineTo(x, H - 106 + Math.sin(x * .03) * 8);
          ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,.35)";
          for (let x = 24; x < W; x += 78) for (let y = 105; y < H - 160; y += 78) {
            ctx.beginPath(); ctx.arc(x + (y % 156 ? 22 : 0), y, 3, 0, TAU); ctx.fill();
          }
          ctx.strokeStyle = "rgba(255,255,255,.78)"; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.moveTo(0, H - 112); ctx.lineTo(W, H - 112); ctx.stroke();
          ctx.strokeStyle = "rgba(55,122,108,.16)"; ctx.lineWidth = 8;
          ctx.strokeRect(12, 64, W - 24, H - 82);
        }
        drawLightning(ctx) {
          ctx.save(); ctx.globalAlpha = .8; ctx.strokeStyle = "#fff36d"; ctx.lineWidth = 5; ctx.lineCap = "round";
          for (const l of this.lightning) {
            for (const t of l.targets) {
              ctx.beginPath(); ctx.moveTo(l.from.x, l.from.y);
              const mx = (l.from.x + t.x) / 2 + rand(-20, 20), my = (l.from.y + t.y) / 2 + rand(-20, 20);
              ctx.lineTo(mx, my); ctx.lineTo(t.x, t.y); ctx.stroke();
            }
          }
          ctx.restore();
        }
        draw() {
          const ctx = this.ctx; ctx.save();
          if (this.shakeTime > 0) ctx.translate(rand(-this.shakePower, this.shakePower), rand(-this.shakePower, this.shakePower));
          this.drawBackground(ctx); this.enemies.draw(ctx); this.player.draw(ctx); this.bullet.draw(ctx); this.drawLightning(ctx); this.effects.draw(ctx); this.input.draw(ctx);
          if (this.flash > 0) { ctx.globalAlpha = clamp(this.flash / .22, 0, .55); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1; }
          ctx.restore();
        }
        loop(now) {
          const dt = Math.min(.033, (now - this.last) / 1000 || 0); this.last = now;
          this.update(dt); this.draw(); this.ui.update(dt);
          requestAnimationFrame(this.loop);
        }
      }
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
          r = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
          this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
        };
      }
      const game = new Game();
      document.getElementById("startBtn").addEventListener("click", () => game.start());
      document.getElementById("againBtn").addEventListener("click", () => game.start());
      document.getElementById("shareBtn").addEventListener("click", async () => {
        const text = `Evolution Bullet 점수 ${game.score.score.toLocaleString()}점, 최고 콤보 ${game.score.bestCombo}!`;
        if (navigator.share) await navigator.share({ title: "Evolution Bullet", text });
        else { await navigator.clipboard.writeText(text); game.ui.banner("COPIED!"); }
      });
      document.addEventListener("gesturestart", e => e.preventDefault());
      let lastTouch = 0;
      document.addEventListener("touchend", e => { const now = Date.now(); if (now - lastTouch < 320) e.preventDefault(); lastTouch = now; }, { passive: false });
    })();
  </script>
